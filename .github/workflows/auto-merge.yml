name: Auto Merge PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  automerge:
    name: Auto Merge
    runs-on: ubuntu-latest
    steps:
      - name: Wait for other checks, then merge if all passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -e
          for i in $(seq 1 60); do
            CHECKS=$(gh api "repos/$REPO/commits/$SHA/check-runs" --jq '[.check_runs[] | select(.name != "Auto Merge")]')
            TOTAL=$(echo "$CHECKS" | jq 'length')
            if [ "$TOTAL" -eq 0 ]; then
              echo "No other checks configured on this commit. Merging now."
              break
            fi
            PENDING=$(echo "$CHECKS" | jq '[.[] | select(.status != "completed")] | length')
            if [ "$PENDING" -gt 0 ]; then
              echo "Waiting for $PENDING check(s) to finish..."
              sleep 15
              continue
            fi
            FAILED=$(echo "$CHECKS" | jq '[.[] | select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")] | length')
            if [ "$FAILED" -gt 0 ]; then
              echo "One or more checks failed. Not merging."
              exit 1
            fi
            echo "All checks passed. Merging."
            break
          done
          gh pr merge --squash --delete-branch "$PR_URL"
